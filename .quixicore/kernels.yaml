schema_version: 0.2
backend: xpu
status_values:
  - implemented
  - partial
  - experimental
  - planned
  - unsupported
  - capability_gated
layout: canonical_variants
# Each op ships one or more implementation variants. Native SYCL and the vendor
# (oneDNN) path are co-equal, selectable at the ABI (quixicore::xpu::Variant),
# analogous to the Metal backend's co-equal PyTorch and MLX bindings.
variant_path_rule: kernels/<family>/<operation>/variants/xpu_<target>
families:
  norms:
    status: partial
    paths:
      - kernels/norms
  activations:
    status: partial
    paths:
      - kernels/activations
  attention:
    status: partial
    paths:
      - kernels/attention
  linear_attention:
    status: partial
    paths:
      - kernels/linear_attention
  ssm:
    status: partial
    paths:
      - kernels/ssm
  matmul:
    status: partial
    paths:
      - kernels/matmul
  quantization:
    status: partial
    paths:
      - kernels/quantization
  moe:
    status: partial
    paths:
      - kernels/moe
  sampling:
    status: partial
    paths:
      - kernels/sampling
  serving:
    status: partial
    paths:
      - kernels/serving
  optimizers:
    status: partial
    paths:
      - kernels/optimizers
  collectives:
    status: capability_gated
    paths:
      - src/dispatch/collectives.cpp
    note: Native multi-GPU sum all-reduce across the 4x B60 (verified); requires >1 GPU. oneCCL vendor variant deferred.
  utils:
    status: partial
    paths:
      - kernels/utils
operations:
  gelu:
    family: activations
    status: implemented
    path: kernels/activations/gelu
    dtypes: [f32, f16, bf16]
    tests:
      correctness: tests/xpu_ops_smoke.cpp
    benchmarks:
      default: perf/configs/activations_gelu.yaml
    variants:
      - name: xpu_sycl
        status: implemented
        path: kernels/activations/gelu/variants/xpu_sycl
      - name: xpu_onednn
        status: implemented
        path: kernels/activations/gelu/variants/xpu_onednn
  softmax:
    family: activations
    status: implemented
    path: kernels/activations/softmax
    dtypes: [f32, f16, bf16]
    tests:
      correctness: tests/xpu_ops_smoke.cpp
    variants:
      - name: xpu_sycl
        status: implemented
        path: kernels/activations/softmax/variants/xpu_sycl
      - name: xpu_onednn
        status: implemented
        path: kernels/activations/softmax/variants/xpu_onednn
  silu:
    family: activations
    status: implemented
    path: kernels/activations/silu
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/activations/silu/variants/xpu_sycl}
  gelu_backward:
    family: activations
    status: implemented
    path: kernels/activations/gelu_backward
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/activations/gelu_backward/variants/xpu_sycl}
  glu:
    family: activations
    status: implemented
    path: kernels/activations/glu
    dtypes: [f32, f16, bf16]
    modes: [swiglu, geglu, reglu, glu]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/activations/glu/variants/xpu_sycl}
  rms_norm:
    family: norms
    status: implemented
    path: kernels/norms/rms_norm
    dtypes: [f32, f16, bf16]
    tests:
      correctness: tests/xpu_ops_smoke.cpp
    variants:
      - name: xpu_sycl
        status: implemented
        path: kernels/norms/rms_norm/variants/xpu_sycl
      # No oneDNN RMSNorm primitive; vendor/best resolve to xpu_sycl.
  dense_gemm:
    family: matmul
    status: implemented
    path: kernels/matmul/dense_gemm
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/matmul/dense_gemm/variants/xpu_sycl}
      - {name: xpu_onednn, status: implemented, path: kernels/matmul/dense_gemm/variants/xpu_onednn}
  qgemv_int4:
    family: quantization
    status: implemented
    path: kernels/quantization/qgemv
    dtypes: [f32, f16, bf16]
    quant_format: int4_group
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/quantization/qgemv/variants/xpu_sycl}
  qgemm_int8:
    family: quantization
    status: implemented
    path: kernels/quantization/qgemm
    dtypes: [f32, f16, bf16]
    quant_format: int8_w8a8
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/quantization/qgemm/variants/xpu_sycl}
      - {name: xpu_onednn, status: implemented, path: kernels/quantization/qgemm/variants/xpu_onednn}
  mxfp4_gemv:
    family: quantization
    status: implemented
    path: kernels/quantization/mxfp4_gemv
    dtypes: [f32, f16, bf16]
    quant_format: mxfp4
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/quantization/mxfp4_gemv/variants/xpu_sycl}
  gguf_gemv:
    family: quantization
    status: implemented
    path: kernels/quantization/gguf_gemv
    dtypes: [f32, f16, bf16]
    quant_format: gguf
    gguf_types: [q8_0, q4_0]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/quantization/gguf_gemv/variants/xpu_sycl}
  nvfp4_gemv:
    family: quantization
    status: implemented
    path: kernels/quantization/nvfp4_gemv
    dtypes: [f32, f16, bf16]
    quant_format: nvfp4
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/quantization/nvfp4_gemv/variants/xpu_sycl}
  fp8_gemm:
    family: quantization
    status: experimental
    path: kernels/quantization/fp8_gemm
    quant_format: fp8
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    note: Correct on B60 (e4m3/e5m2) but not hardware-accelerated this generation.
    variants:
      - {name: xpu_onednn, status: experimental, path: kernels/quantization/fp8_gemm/variants/xpu_onednn}
  selective_scan:
    family: ssm
    status: implemented
    path: kernels/ssm/selective_scan
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/ssm/selective_scan/variants/xpu_sycl}
  linear_attn:
    family: linear_attention
    status: implemented
    path: kernels/linear_attention/linear_attn
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/linear_attention/linear_attn/variants/xpu_sycl}
  moe_route_topk:
    family: moe
    status: implemented
    path: kernels/moe/moe_route
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/moe/moe_route/variants/xpu_sycl}
  dropout:
    family: utils
    status: implemented
    path: kernels/utils/dropout
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/utils/dropout/variants/xpu_sycl}
  cross_entropy:
    family: utils
    status: implemented
    path: kernels/utils/cross_entropy
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/utils/cross_entropy/variants/xpu_sycl}
  hadamard:
    family: utils
    status: implemented
    path: kernels/utils/hadamard
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/utils/hadamard/variants/xpu_sycl}
  embedding_lookup:
    family: serving
    status: implemented
    path: kernels/serving
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/serving/variants/xpu_sycl}
  kv_cache_scatter:
    family: serving
    status: implemented
    path: kernels/serving
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/serving/variants/xpu_sycl}
  kv_cache_gather:
    family: serving
    status: implemented
    path: kernels/serving
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/serving/variants/xpu_sycl}
  rope:
    family: attention
    status: implemented
    path: kernels/attention/rope
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/attention/rope/variants/xpu_sycl}
  adamw:
    family: optimizers
    status: implemented
    path: kernels/optimizers/adamw
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/optimizers/adamw/variants/xpu_sycl}
  argmax:
    family: sampling
    status: implemented
    path: kernels/sampling/argmax
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/sampling/argmax/variants/xpu_sycl}
  layernorm:
    family: norms
    status: implemented
    path: kernels/norms/layernorm
    dtypes: [f32, f16, bf16]
    tests:
      correctness: tests/xpu_ops_smoke.cpp
    variants:
      - name: xpu_sycl
        status: implemented
        path: kernels/norms/layernorm/variants/xpu_sycl
      - name: xpu_onednn
        status: implemented
        path: kernels/norms/layernorm/variants/xpu_onednn
notes: >-
  GELU is the reference operation and landed with both a native SYCL variant and
  a co-equal oneDNN vendor variant, correctness-checked on Arc Pro B60 across
  f32/f16/bf16 and benchmarked (see perf/optimization_status.md 2026-07-06). No
  other family is claimed implemented until native XPU code, correctness tests,
  and benchmark coverage land. GLU and GELU-backward remain planned, so the
  activations family is `partial`.
