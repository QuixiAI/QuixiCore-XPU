schema_version: 0.2
backend: xpu
status_values:
  - implemented
  - partial
  - experimental
  - planned
  - unsupported
  - capability_gated
layout: canonical_variants
# Each op ships one or more implementation variants. Native SYCL and the vendor
# (oneDNN) path are co-equal, selectable at the ABI (quixicore::xpu::Variant),
# analogous to the Metal backend's co-equal PyTorch and MLX bindings.
variant_path_rule: kernels/<family>/<operation>/variants/xpu_<target>
differentiation:
  automatic_autograd: false
  explicit_backward_operations: [gelu_backward]
  scope: inference_first
  note: >-
    Forward operators require caller-managed gradients; training-complete
    coverage is not claimed.
families:
  norms:
    status: partial
    paths:
      - kernels/norms
  activations:
    status: partial
    paths:
      - kernels/activations
  attention:
    status: partial
    paths:
      - kernels/attention
  linear_attention:
    status: partial
    paths:
      - kernels/linear_attention
  ssm:
    status: partial
    paths:
      - kernels/ssm
  matmul:
    status: partial
    paths:
      - kernels/matmul
  quantization:
    status: partial
    paths:
      - kernels/quantization
  moe:
    status: partial
    paths:
      - kernels/moe
  sampling:
    status: partial
    paths:
      - kernels/sampling
  serving:
    status: partial
    paths:
      - kernels/serving
  optimizers:
    status: partial
    paths:
      - kernels/optimizers
  collectives:
    status: capability_gated
    paths:
      - src/dispatch/collectives.cpp
    note: Native multi-GPU sum all-reduce across the 4x B60 (verified); requires >1 GPU. oneCCL vendor variant deferred.
  utils:
    status: partial
    paths:
      - kernels/utils
operations:
  gelu:
    family: activations
    status: implemented
    path: kernels/activations/gelu
    dtypes: [f32, f16, bf16]
    tests:
      correctness: tests/xpu_ops_smoke.cpp
    benchmarks:
      default: perf/configs/activations_gelu.yaml
    variants:
      - name: xpu_sycl
        status: implemented
        path: kernels/activations/gelu/variants/xpu_sycl
      - name: xpu_onednn
        status: implemented
        path: kernels/activations/gelu/variants/xpu_onednn
  softmax:
    family: activations
    status: implemented
    path: kernels/activations/softmax
    dtypes: [f32, f16, bf16]
    tests:
      correctness: tests/xpu_ops_smoke.cpp
    variants:
      - name: xpu_sycl
        status: implemented
        path: kernels/activations/softmax/variants/xpu_sycl
      - name: xpu_onednn
        status: implemented
        path: kernels/activations/softmax/variants/xpu_onednn
  silu:
    family: activations
    status: implemented
    path: kernels/activations/silu
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/activations/silu/variants/xpu_sycl}
  gelu_backward:
    family: activations
    status: implemented
    direction: backward
    path: kernels/activations/gelu_backward
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    bindings: {pytorch: bindings/pytorch/tk_xpu_ext.sycl}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/activations/gelu_backward/variants/xpu_sycl}
  glu:
    family: activations
    status: implemented
    path: kernels/activations/glu
    dtypes: [f32, f16, bf16]
    modes: [swiglu, geglu, reglu, glu]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/activations/glu/variants/xpu_sycl}
  rms_norm:
    family: norms
    status: implemented
    path: kernels/norms/rms_norm
    dtypes: [f32, f16, bf16]
    tests:
      correctness: tests/xpu_ops_smoke.cpp
    variants:
      - name: xpu_sycl
        status: implemented
        path: kernels/norms/rms_norm/variants/xpu_sycl
      # No oneDNN RMSNorm primitive; vendor/best resolve to xpu_sycl.
  fused_add_rms_norm:
    family: norms
    status: experimental
    path: kernels/norms/rms_norm
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    benchmarks: {default: perf/configs/serving_qwen_decode.yaml}
    variants:
      - {name: xpu_sycl, status: experimental, path: kernels/norms/rms_norm/variants/xpu_sycl}

  rms_residual_next:
    family: norms
    status: implemented
    path: kernels/norms/rms_norm
    dtypes: [f32, f16, bf16]
    shape: residual-add + double RMSNorm -> f16
    note: >-
      Fused residual-add + double RMSNorm with f16 convert. Extends
      fused_add_rms_norm to the transformer layer boundary: RMS-normalize the
      sublayer output (projection) by post_weight, add it into the residual
      stream (in place), then RMS-normalize the updated residual by next_weight
      for the next layer and convert to f16 -- one launch in place of the
      post-norm + residual add + next pre-norm + f16 convert (~2 launches/layer
      saved). Ported from embeddinggemma.c engine_xpu.cpp
      launch_rms_residual_next_half (clean subgroup form) with kernels.c
      ei_rms_norm_residual_inplace / ei_rms_norm as the fp64 oracle.
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    benchmarks: {harness: "perf/harness/xpu_bench.cpp --kernel rms_residual_next --approx {fused,unfused}"}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/norms/rms_norm/variants/xpu_sycl}
  dense_gemm:
    family: matmul
    status: implemented
    path: kernels/matmul/dense_gemm
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/matmul/dense_gemm/variants/xpu_sycl}
      - {name: xpu_onednn, status: implemented, path: kernels/matmul/dense_gemm/variants/xpu_onednn}
  sample_categorical:
    family: sampling
    status: implemented
    path: kernels/sampling/sample
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/sampling/sample/variants/xpu_sycl}
  top_k_sample:
    family: sampling
    status: implemented
    path: kernels/sampling/sample
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/sampling/sample/variants/xpu_sycl}
  quantize_int4_group:
    family: quantization
    status: implemented
    path: kernels/quantization/quantize
    dtypes: [f32, f16, bf16]
    quant_format: int4_group
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/quantization/quantize/variants/xpu_sycl}
  act_quant_int8:
    family: quantization
    status: implemented
    path: kernels/quantization/act_quant
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/quantization/act_quant/variants/xpu_sycl}
  qgemv_int4:
    family: quantization
    status: implemented
    path: kernels/quantization/qgemv
    dtypes: [f32, f16, bf16]
    quant_format: int4_group
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/quantization/qgemv/variants/xpu_sycl}
  qgemm_int8:
    family: quantization
    status: implemented
    path: kernels/quantization/qgemm
    dtypes: [f32, f16, bf16]
    quant_format: int8_w8a8
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/quantization/qgemm/variants/xpu_sycl}
      - {name: xpu_onednn, status: implemented, path: kernels/quantization/qgemm/variants/xpu_onednn}
  mxfp4_gemv:
    family: quantization
    status: implemented
    path: kernels/quantization/mxfp4_gemv
    dtypes: [f32, f16, bf16]
    quant_format: mxfp4
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/quantization/mxfp4_gemv/variants/xpu_sycl}
  gguf_gemv:
    family: quantization
    status: implemented
    path: kernels/quantization/gguf_gemv
    dtypes: [f32, f16, bf16]
    quant_format: gguf
    gguf_types: [q8_0, q4_0, q4_1, q5_0, q5_1, q6_K, q4_K, q5_K, q2_K, q3_K, iq4_nl, iq4_xs, iq2_xxs, iq2_xs, iq3_xxs, iq1_s]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/quantization/gguf_gemv/variants/xpu_sycl}
  nvfp4_gemv:
    family: quantization
    status: implemented
    path: kernels/quantization/nvfp4_gemv
    dtypes: [f32, f16, bf16]
    quant_format: nvfp4
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/quantization/nvfp4_gemv/variants/xpu_sycl}
  nvfp4_gemm:
    family: quantization
    status: experimental
    path: kernels/quantization/nvfp4_gemv
    dtypes: [f32, f16, bf16]
    quant_format: nvfp4
    layouts: {activation: "[M,K]", weight: "[N,K/2]", output: "[M,N]"}
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    benchmarks: {default: perf/configs/serving_qwen_decode.yaml}
    variants:
      - {name: xpu_sycl_row_loop, status: experimental, path: kernels/quantization/nvfp4_gemv/variants/xpu_sycl}
      - {name: xpu_sycl_mtiled, status: experimental, path: kernels/quantization/nvfp4_gemv/variants/xpu_sycl, note: "Measured research path; not selected at M=1,4,8"}
  fp8_gemm:
    family: quantization
    status: experimental
    path: kernels/quantization/fp8_gemm
    quant_format: fp8
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    note: Correct on B60 (e4m3/e5m2) but not hardware-accelerated this generation.
    variants:
      - {name: xpu_onednn, status: experimental, path: kernels/quantization/fp8_gemm/variants/xpu_onednn}
  fp8_gemm_w8a16:
    family: quantization
    status: experimental
    path: kernels/quantization/fp8_gemm
    quant_format: fp8
    dtypes: [f32, f16, bf16]
    layouts: {activation: "[M,K]", weight: "[N,K]", output: "[M,N]"}
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    benchmarks: {default: perf/configs/serving_qwen_decode.yaml}
    variants:
      - {name: xpu_sycl, status: experimental, path: kernels/quantization/fp8_gemm/variants/xpu_sycl}
      - {name: xpu_onednn, status: experimental, path: kernels/quantization/fp8_gemm/variants/xpu_onednn}
  selective_scan:
    family: ssm
    status: implemented
    path: kernels/ssm/selective_scan
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/ssm/selective_scan/variants/xpu_sycl}
  linear_attn:
    family: linear_attention
    status: implemented
    path: kernels/linear_attention/linear_attn
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/linear_attention/linear_attn/variants/xpu_sycl}
  qwen_gdn_decode:
    family: linear_attention
    status: experimental
    path: kernels/linear_attention/qwen_gdn_decode
    dtypes: [f32, f16, bf16]
    scope: qwen3_5_qwen3_6_non_interleaved_decode
    note: >-
      State slots in [0,slots) are valid; invalid slots preserve z and skip
      state mutation.
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    benchmarks: {default: perf/configs/serving_qwen_decode.yaml}
    variants:
      - {name: xpu_sycl, status: experimental, path: kernels/linear_attention/qwen_gdn_decode/variants/xpu_sycl}
  moe_route_topk:
    family: moe
    status: implemented
    path: kernels/moe/moe_route
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/moe/moe_route/variants/xpu_sycl}
  nvfp4_moe:
    family: moe
    status: experimental
    path: kernels/moe/nvfp4_moe
    dtypes: [f32, f16, bf16]
    quant_format: nvfp4
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    benchmarks: {default: perf/configs/serving_qwen_decode.yaml}
    variants:
      - {name: xpu_sycl_fused, status: experimental, path: kernels/moe/nvfp4_moe/variants/xpu_sycl}
      - {name: xpu_sycl_split, status: experimental, path: kernels/moe/nvfp4_moe/variants/xpu_sycl}
  dropout:
    family: utils
    status: implemented
    path: kernels/utils/dropout
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/utils/dropout/variants/xpu_sycl}
  cross_entropy:
    family: utils
    status: implemented
    path: kernels/utils/cross_entropy
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/utils/cross_entropy/variants/xpu_sycl}
  hadamard:
    family: utils
    status: implemented
    path: kernels/utils/hadamard
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/utils/hadamard/variants/xpu_sycl}
  embedding_lookup:
    family: serving
    status: implemented
    path: kernels/serving
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/serving/variants/xpu_sycl}
  kv_cache_scatter:
    family: serving
    status: implemented
    path: kernels/serving
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/serving/variants/xpu_sycl}
  kv_cache_gather:
    family: serving
    status: implemented
    path: kernels/serving
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/serving/variants/xpu_sycl}
  pool_mean_rms_l2:
    family: serving
    status: implemented
    path: kernels/serving
    dtypes: [f32, f16, bf16]
    shape: masked-mean + per-token RMSNorm + L2 pooling head
    shape_keys: {dim: [256, 512, 768, 1024]}
    note: >-
      Sentence-embedding pooling head. One kernel fuses per-token RMSNorm (learned
      weight), a masked mean over each sequence's token range (CSR offsets), and a
      final L2 normalize -- reading the token embeddings once and writing one
      vector per sequence. One subgroup owns each sequence's dim-vector; dim is a
      compile-time shape key. Ported from embeddinggemma.c's engine_xpu.cpp
      launch_pool / kernels.c ei_mean_pool_rms_l2 (fp64 oracle).
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    benchmarks: {harness: "perf/harness/xpu_bench.cpp --kernel pool_mean_rms_l2 --approx {fused,unfused}"}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/serving/variants/xpu_sycl}
  attention:
    family: attention
    status: implemented
    path: kernels/attention/attention
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/attention/attention/variants/xpu_sycl}
  attention_f16ctx:
    family: attention
    status: implemented
    path: kernels/attention/attention
    dtypes: [f32, f16, bf16]
    shape: online-attention + fused f16 context store
    note: >-
      Flash SDPA whose epilogue also writes a rounded f16 copy of the output
      (O_f16), folding the ctx->f16 convert a downstream attention-output GEMM
      needs into the attention pass. Ported from embeddinggemma.c's
      EI_XPU_FUSE_ATTN_OUTPUT_HALF online-attention epilogue.
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    benchmarks: {harness: "perf/harness/xpu_bench.cpp --kernel attention_f16ctx --approx {fused,unfused}"}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/attention/attention/variants/xpu_sycl}
  rope:
    family: attention
    status: implemented
    path: kernels/attention/rope
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/attention/rope/variants/xpu_sycl}

  qk_norm_rope:
    family: attention
    status: implemented
    path: kernels/attention/qk_norm_rope
    dtypes: [f32, f16, bf16]
    shape: per-head RMSNorm + query-scale + RoPE
    note: >-
      Fused per-head QK-norm + RoPE with an optional f16 convert. For every
      (token, head) of Q and K: RMS-normalize the head-dim vector by its learned
      weight, scale query heads by query_scale (keys by 1), then apply NeoX
      half-split RoPE at position (pos0 + token) -- one launch in place of
      rms_norm(Q) + rms_norm(K) + query-scale + rope(Q) + rope(K). One subgroup
      per (token, head); GQA via n_head_kv < n_head. Ported from
      embeddinggemma.c engine_xpu.cpp launch_qk_norm_rope (the richer
      launch_qkv_epilogue, which encodes the model fused-QKV layout, was not
      ported); kernels.c ei_qk_norm_rope_qk_inplace is the fp64 oracle.
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    benchmarks: {harness: "perf/harness/xpu_bench.cpp --kernel qk_norm_rope --approx {fused,unfused}"}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/attention/qk_norm_rope/variants/xpu_sycl}
  adamw:
    family: optimizers
    status: implemented
    path: kernels/optimizers/adamw
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/optimizers/adamw/variants/xpu_sycl}
  argmax:
    family: sampling
    status: implemented
    path: kernels/sampling/argmax
    dtypes: [f32, f16, bf16]
    tests: {correctness: tests/xpu_ops_smoke.cpp}
    variants:
      - {name: xpu_sycl, status: implemented, path: kernels/sampling/argmax/variants/xpu_sycl}
  layernorm:
    family: norms
    status: implemented
    path: kernels/norms/layernorm
    dtypes: [f32, f16, bf16]
    tests:
      correctness: tests/xpu_ops_smoke.cpp
    variants:
      - name: xpu_sycl
        status: implemented
        path: kernels/norms/layernorm/variants/xpu_sycl
      - name: xpu_onednn
        status: implemented
        path: kernels/norms/layernorm/variants/xpu_onednn
notes: >-
  GELU is the reference operation and landed with both a native SYCL variant and
  a co-equal oneDNN vendor variant, correctness-checked on Arc Pro B60 across
  f32/f16/bf16 and benchmarked (see perf/optimization_status.md 2026-07-06).
  Operation status is authoritative per entry; family status remains `partial`
  until the full shared-contract family is covered. The backend is
  inference-first and does not claim complete backward or PyTorch-autograd
  coverage.

bindings:
  pytorch:
    status: implemented
    path: bindings/pytorch
    note: >-
      torch.xpu zero-copy binding (tk_xpu); queue off the tensor XPU stream ->
      ops ABI on data_ptr. Validated vs torch.xpu eager kernels (f32/bf16/f16).
      Manual gelu_backward is exposed, but forward ops do not register autograd
      formulas and training-complete backward coverage is not claimed.
      Requires a shared ops lib (icpx -fsycl) + a .sycl binding source.
