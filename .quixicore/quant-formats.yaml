schema_version: 0.2
backend: xpu
# Quant formats are DATA ENCODINGS + DEQUANT ALGORITHMS, not vendor hardware
# features. mxfp4/mxfp6/mxfp8 (OCP microscaling), nvfp4 (E2M1 + fp8 block scale),
# fp8 (e4m3/e5m2), AWQ (activation-aware int4 weights + scales), GGUF k-quants,
# and bitnet all decode to a compute dtype and/or feed Intel XMX/DPAS int8/fp8
# paths. The "these are NVIDIA-only" framing is marketing, not a hardware limit.
# Every format below is IN SCOPE for XPU and must be marked `planned` (or better)
# as it lands -- never `unsupported` on the assumption that it needs NVIDIA
# silicon. If a format is ever marked `unsupported`, that must be backed by an
# actual on-B60 measurement/attempt, not inherited wisdom.
formats:
  gguf:
    status: implemented
    note: >-
      GGUF (llama.cpp) block quants -- ALL 16 weight formats decode natively on
      B60 via hand-written kernels: q8_0/q4_0/q4_1/q5_0/q5_1, all k-quants
      (q6_K/q4_K/q5_K/q2_K/q3_K), and all i-quants (iq4_nl/iq4_xs/iq2_xxs/iq2_xs/
      iq3_xxs/iq1_s, grid/codebook tables ported from ggml). Each validated vs an
      independent ggml host replica. (q8_1/q8_K are activation intermediates, N/A.)
  mxfp8:
    status: planned
    note: OCP microscaling FP8 (e4m3/e5m2 elements, e8m0 block scale).
  mxfp6:
    status: planned
  mxfp4:
    status: experimental
    note: >-
      OCP microscaling FP4 (e2m1 elements, e8m0 power-of-two block scale, block
      32). Landed as quantization/mxfp4_gemv with a native hand-written decoder
      (e2m1 LUT + 2^(e8m0-127)) -- correct on B60, ~on par with fp16 GEMV.
      Proves MX FP4 is not Blackwell-exclusive; it decodes natively on Intel.
  nvfp4:
    status: experimental
    note: >-
      FP4 e2m1 + e4m3 (fp8) block scale (block 16) + per-tensor fp32 scale. Landed
      as quantization/nvfp4_gemv with bit-relocation decode and now includes
      batched W4A16 GEMM plus fused/split routed MoE in checkpoint-native layouts.
      Correct on B60. NVIDIA FP4 is not NVIDIA-exclusive; it decodes natively on
      Intel.
  fp8:
    status: experimental
    note: >-
      e4m3 + e5m2 W8A8 GEMM and W8A16 weight-only GEMM are available. W8A16
      keeps checkpoint weights in [N,K], routes M=1 decode to native SYCL, and
      uses oneDNN for M>1. fp8_encode/fp8_decode codecs are vendor-backed.
  fp4:
    status: planned
    note: generic fp4_e2m1 packing.
  awq:
    status: planned
    note: Activation-aware weight quant (int4 weights + scales); a method, fully portable.
  int4_group:
    status: experimental
    note: >-
      Symmetric signed int4, packed 2/byte, per-group fp16 scales (AWQ/GPTQ-style
      groupwise). First decode landed as quantization/qgemv (int4 GEMV that beats
      fp16 GEMV on B60). Proof that groupwise int4 runs natively on Intel GPU.
  int8:
    status: experimental
    note: >-
      w8a8, per-token (row) activation + per-channel (col) weight scales. Landed
      as quantization/qgemm; oneDNN XMX/DPAS int8 path measured ~182 TOPS on B60
      (2x the bf16 GEMM). Native DPAS joint_matrix path is a follow-up.
  bitnet:
    status: planned
status_values:
  - implemented
  - partial
  - experimental
  - planned
  - unsupported
notes: >-
  Format maturity is recorded per entry. Support is claimed only after an XPU
  decode/compute path, correctness against the shared byte layout, and benchmark
  coverage land. Nothing here is out of scope on hardware grounds.
